<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Zapiski</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>Moji zapiski</h1>

        <form action="/add" method="POST" class="note-form">

            <input
                type="text"
                name="title"
                placeholder="Naslov"
                required>

            <textarea
                name="content"
                placeholder="Vsebina zapiska"
                required></textarea>

            <button type="submit">Dodaj zapisek</button>

        </form>

        <hr>

        {% for note in notes %}
        <div class="note" id="note-{{ note.doc_id }}">

            <h2>{{ note.title }}</h2>

            <p>{{ note.content }}</p>

            <button onclick="deleteNote({{ note.doc_id }})">
                Izbriši
            </button>

        </div>
        {% endfor %}
    </div>

<script>
function deleteNote(id)
{
    fetch("/delete/" + id, {
        method: "POST"
    })
    .then(response => response.json())
    .then(data => {
        if(data.ok)
        {
            document.getElementById("note-" + id).remove();
        }
    });
}
</script>

</body>
</html>
