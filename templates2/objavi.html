{% extends "base.html" %}
{% block vsebina %}
<h1>Nova objava</h1>
<div class="kartica">
    <form method="POST" enctype="multipart/form-data">
        <label>Besedilo:</label>
        <textarea name="besedilo" rows="4" required></textarea>
        <label>Slika (neobvezno):</label>
        <input type="file" name="slika" accept="image/*">
        <button type="submit">Objavi</button>
        <a href="/" class="btn">Prekliči</a>
    </form>
</div>
{% endblock %}
