{% extends "base.html" %}
{% block vsebina %}
<h1>Nov zapisek</h1>
<div class="kartica">
    <form method="POST">
        <label>Naslov:</label>
        <input type="text" name="naslov" required>
        <label>Vsebina:</label>
        <textarea name="vsebina" rows="6" required></textarea>
        <button type="submit">Shrani</button>
        <a href="/" class="btn">Prekliči</a>
    </form>
</div>
{% endblock %}
