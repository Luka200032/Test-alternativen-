{% extends "base.html" %}
{% block vsebina %}
<h1>Registracija</h1>
{% if napaka %}<p class="napaka">{{ napaka }}</p>{% endif %}
<div class="kartica">
    <form method="POST">
        <label>Uporabniško ime:</label>
        <input type="text" name="ime" required>
        <label>Geslo:</label>
        <input type="password" name="geslo" required>
        <button type="submit">Registracija</button>
    </form>
    <p>Že imaš račun? <a href="/login">Prijava</a></p>
</div>
{% endblock %}
