{% extends "base.html" %}
{% block vsebina %}
<h1>Uredi zapisek</h1>
<div class="kartica">
    <form method="POST">
        <label>Naslov:</label>
        <input type="text" name="naslov" value="{{ z.naslov }}" required>
        <label>Vsebina:</label>
        <textarea name="vsebina" rows="6" required>{{ z.vsebina }}</textarea>
        <button type="submit">Shrani</button>
        <a href="/" class="btn">Prekliči</a>
    </form>
</div>
{% endblock %}
